title: "About Joshua"
description: "A practical full-stack developer who moved from operations work into building web systems."
content: |
  Hi, I'm **Joshua Dumandan**, a full-stack web developer based in the Philippines.

  Before software development, I worked in insurance operations. That experience helped me understand how important accuracy, documentation, and clear workflows are when people rely on a system to do their work.

  I now work with **Laravel, PHP, Vue.js, MySQL, REST APIs, and modern frontend tooling**. My day-to-day work includes building features, fixing bugs, integrating APIs, updating database behavior, and coordinating with QA.

  I like development work that is useful and grounded. Clean UI matters to me, but so does maintainable backend logic, readable code, and knowing why a feature exists in the first place.

  I am also comfortable using AI-assisted coding tools. I treat them as a way to move faster and explore options, while still reviewing the output carefully and making sure I understand the code.
