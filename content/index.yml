about:
  title: "About"
  description: |
    I moved into software development after working in insurance operations, which gave me a practical view of how business systems are used day to day. That background still shapes how I build: I care about clear workflows, reliable details, and features that make sense for real users.

    Today I work as a full-stack web developer, building and maintaining features across Vue.js, Laravel, PHP, and MySQL. My work includes frontend implementation, backend changes, API integrations, bug fixing, database updates, and coordinating with QA to move issues from report to release.
  points:
    - "I am comfortable moving between frontend and backend work when a feature needs both sides."
    - "I like clear UI, readable code, and small decisions that make systems easier to maintain."
    - "I use modern tooling to move faster while still reviewing, testing, and understanding the code I ship."
